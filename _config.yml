# GitHub Pages configuration
# This file explicitly disables Jekyll processing for static sites

# Tell GitHub Pages to not process with Jekyll
plugins: []

# Exclude all files from Jekyll processing
exclude:
  - "*"

# Set empty include to override default behavior
include: []

# Disable Sass/SCSS processing
sass:
  sass_dir: null
  style: compressed

# Markdown processor (disabled)
markdown: null
highlighter: null

# Base URL and other settings
baseurl: ""
url: ""

# Force static site mode
static_site: true
